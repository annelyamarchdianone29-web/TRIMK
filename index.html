<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    .navbar {
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--stroke);
    }

    .hero {
      min-height: 300px;
      padding: 80px 0;
      display: flex;
      align-items: center;
      background: linear-gradient(
        135deg,
        var(--accent-light) 10%,
        var(--background) 60%,
        var(--primary-light) 100%
      );
    }

    .hero h1 {
      color: var(--black);
    }

    .hero p {
      max-width: 550px;
      color: var(--black-75);
    }

    .hero-image {
      object-fit: cover;
    }
  </style>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">PartTimeHub</a>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary">Masuk</button>
          <button class="btn btn-primary">Daftar</button>
        </div>
      </div>
    </nav>

    <section class="hero">
      <div class="container-lg">
        <div class="row align-items-center g-5">
          <div class="col-lg-6">
            <span class="badge rounded-pill text-bg-light">
              #1 Platform Part-Time di Indonesia
            </span>
            <h1 class="display-4 fw-bold">
              Temukan Pekerjaan Part-Time dengan Mudah
            </h1>
            <p class="text-secondary mt-3">
              PartTimeHub menghubungkan pencari kerja part-time dengan pemilik
              usaha untuk peluang terbaik secara cepat, mudah, dan terpercaya.
            </p>
            <div class="d-flex gap-3 mt-4">
              <a href="#" class="btn btn-primary px-4">Bergabung Sekarang</a>
            </div>
          </div>
          <div
            class="col-lg-6 d-flex justify-content-center justify-content-lg-end"
          >
            <img src="#" class="img-fluid hero-image" />
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

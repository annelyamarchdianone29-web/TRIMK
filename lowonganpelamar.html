                    <label class="form-check-label" for="gaji3"

    <script

    <script>
      const jobs = [

          image: "grab.png",
        },
        {

          salaryValue: 2200000,
          salary: "Rp2.200.000 / bln",
          location: "Jakarta",
          shift: "Shift Pagi",
          experience: "Minimal 1 Tahun",
          kategori: "Admin & Kasir",
          type: "Part-Time",
          desc: "Mengelola stok barang, input data, dan membantu proses pengemasan pesanan pelanggan.",
          image: "tokped.jpg",
        },
        {
          company: "Indomaret",
          title: "Kasir",
          salaryValue: 1700000,
          salary: "Rp1.700.000 / bln",
          location: "Salatiga",
          shift: "Shift Pagi",
          experience: "Tanpa Pengalaman",
          kategori: "Admin & Kasir",
          type: "Part-Time",

          image: "indomaret.jpg",
        },
        {
          company: "Ruangguru",
          title: "Tutor Online Paruh Waktu",
          salaryValue: 2500000,
          salary: "Rp2.500.000 / bln",
          location: "Remote",
          shift: "Fleksibel",
          experience: "Minimal 1 Tahun",
          kategori: "Pendidikan",
          type: "Part-Time",
          desc: "Mengajar siswa secara online melalui platform sesuai jadwal dan mata pelajaran yang dikuasai.",
          image: "rg.jpg",
        },
        {
          company: "McDonald's",
          title: "Crew Store",
          salaryValue: 2000000,
          salary: "Rp2.000.000 / bln",
          location: "Jakarta",
          shift: "Shift Malam",
          experience: "Tanpa Pengalaman",
          kategori: "Food & Beverage",
          type: "Part-Time",
          desc: "Melayani pelanggan di kasir maupun dapur serta menjaga kebersihan dan kecepatan pelayanan.",
          image: "mcd.jpg",
        },
        {
          company: "Alfamart",
          title: "Kasir",
          salaryValue: 1600000,
          salary: "Rp1.600.000 / bln",
          location: "Salatiga",
          shift: "Shift Siang",
          experience: "Tanpa Pengalaman",
          kategori: "Admin & Kasir",
          type: "Part-Time",
          desc: "Menangani transaksi penjualan, penataan produk, dan pelayanan pelanggan di toko.",
          image: "alfamart.png",
        },
        {
          company: "Zenius",
          title: "Tutor Privat",
          salaryValue: 2300000,
          salary: "Rp2.300.000 / bln",
          location: "Remote",
          shift: "Fleksibel",
          experience: "Minimal 1 Tahun",
          kategori: "Pendidikan",
          type: "Part-Time",
          desc: "Memberikan bimbingan belajar privat secara online untuk siswa SD hingga SMA.",
          image: "zenius.jpg",
        },
      ];

      const grid = document.getElementById("job-grid");
      const emptyState = document.getElementById("empty-state");
      const sortSelect = document.getElementById("sortSelect");

      function getSelectedValues(group) {
        return Array.from(
          document.querySelectorAll(
            `.filter-input[data-group="${group}"]:checked`,
          ),
        ).map((el) => el.dataset.value);
      }

      function getSelectedRanges() {
        return Array.from(
          document.querySelectorAll('.filter-input[data-group="gaji"]:checked'),
        ).map((el) => ({
          min: Number(el.dataset.min),
          max: Number(el.dataset.max),
        }));
      }

      function renderJobs(list) {
        if (list.length === 0) {
          grid.innerHTML = "";
          emptyState.classList.remove("d-none");
        } else {
          emptyState.classList.add("d-none");
          grid.innerHTML = list
            .map(
              (job) => `
            <div class="col-md-6 col-xl-4">
              <div class="card h-100">
                <div class="job-img-cap">
                  <img src="${job.image}" alt="${job.company}" class="job-img-cap-img">
                </div>
                <div class="card-body d-flex flex-column">
                  <p class="text-secondary small mb-1">${job.company}</p>
                  <h5 class="card-title fw-bold">${job.title}</h5>
                  <p class="fw-semibold text-primary">${job.salary}</p>
                  <p class="small text-secondary mb-2">
                    <i class="bi bi-geo-alt"></i> ${job.location}
                    &nbsp;<i class="bi bi-clock"></i> ${job.shift}
                    &nbsp;<i class="bi bi-briefcase"></i> ${job.type}
                  </p>
                  <p class="card-text small text-truncate">${job.desc}</p>
                  <div class="d-flex gap-2 mt-auto">
                    <a href="${job.detailUrl || '#'}" class="btn btn-outline-primary btn-sm flex-fill">Lihat Detail</a>
                    <button class="btn btn-primary btn-sm flex-fill">Lamar</button>
                  </div>
                </div>
              </div>
            </div>
          `,
            )
            .join("");
        }
      }

      function applyFilters() {
        const kategori = getSelectedValues("kategori");
        const lokasi = getSelectedValues("lokasi");
        const jam = getSelectedValues("jam");
        const pengalaman = getSelectedValues("pengalaman");
        const gajiRanges = getSelectedRanges();

        let result = jobs.filter((job) => {
          const matchKategori =
            kategori.length === 0 || kategori.includes(job.kategori);
          const matchLokasi =
            lokasi.length === 0 || lokasi.includes(job.location);
          const matchJam = jam.length === 0 || jam.includes(job.shift);
          const matchPengalaman =
            pengalaman.length === 0 || pengalaman.includes(job.experience);
          const matchGaji =
            gajiRanges.length === 0 ||
            gajiRanges.some(
              (r) => job.salaryValue >= r.min && job.salaryValue < r.max,
            );

          return (
            matchKategori &&
            matchLokasi &&
            matchJam &&
            matchPengalaman &&
            matchGaji
          );
        });

        if (sortSelect.value === "gaji") {
          result = result.slice().sort((a, b) => b.salaryValue - a.salaryValue);
        }

        renderJobs(result);
      }

      document.querySelectorAll(".filter-input").forEach((el) => {
        el.addEventListener("change", applyFilters);
      });
      sortSelect.addEventListener("change", applyFilters);
      document.getElementById("resetFilter").addEventListener("click", (e) => {
        e.preventDefault();
        document
          .querySelectorAll(".filter-input")
          .forEach((el) => (el.checked = false));
        sortSelect.value = "terbaru";
        applyFilters();
      });

      renderJobs(jobs);
    </script>
  </body>
